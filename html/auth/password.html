<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación de Contraseña</title>
    <link rel="stylesheet" href="../../css/modules/auth/password.css">
</head>
<body>
    <div class="password">
        <h2 class="password__title">Recuperar Contraseña</h2>
        <form class="password__form" action="#" method="post">
            <label for="recovery" class="password__label">Ingresar su Correo Electrónico</label>
            <input type="email" id="recovery" name="recovery" class="password__input" required>

            <button type="submit" class="password__button">Enviar</button>
        </form>
    </div>
</body>
</html>
