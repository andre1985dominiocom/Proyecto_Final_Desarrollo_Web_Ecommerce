<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login DidiStore</title>
    <link rel="stylesheet" href="../../css/modules/auth/login.css">
</head>
<body>
    <div class="login">
        <h2 class="login__title">Iniciar Sesión</h2>
        <form class="login__form" action="#" method="post">
            <label for="username" class="login__label">Usuario:</label>
            <input type="text" id="username" name="username" class="login__input" required>

            <label for="password" class="login__label">Contraseña:</label>
            <input type="password" id="password" name="password" class="login__input" required>

            <button type="submit" class="login__button">Ingresar</button>
        </form>
        <p class="login__register">¿No tienes una cuenta? <a href="../auth/register.html" class="login__register-link">Regístrate aquí</a></p>
        <p class="login__olvido">¿Olvidaste tu contraseña? <a href="../auth/password.html" class="login__olvido-link">Recupérala aquí</a></p>
    </div>
</body>
</html>
