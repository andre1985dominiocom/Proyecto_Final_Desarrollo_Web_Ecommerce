<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Producto - DidiStore</title>
    <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
    <div class="container" style="padding: 20px;">
        <!-- Ejemplo de tarjeta de producto -->
        <article class="product-card">
            <div class="product-card__image-container">
                <img
                    src="../../assets/logos/Group_3-removebg-preview.png"
                    alt="Nombre del Producto"
                    class="product-card__image"
                >
                <span class="product-card__badge">Nuevo</span>
            </div>
            <div class="product-card__body">
                <h3 class="product-card__name">Nombre del Producto</h3>
                <p class="product-card__description">Descripción breve del producto con sus principales características.</p>
                <div class="product-card__pricing">
                    <span class="product-card__price">$99.900</span>
                    <span class="product-card__price--original">$120.000</span>
                </div>
            </div>
            <div class="product-card__footer">
                <a href="../product/product-detail.html" class="btn btn--secondary product-card__button--detail">Ver Detalle</a>
                <button class="btn btn--primary product-card__button--cart">&#128722; Agregar al Carrito</button>
            </div>
        </article>
    </div>
</body>
</html>
